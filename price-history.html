<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암호화폐 가격 기록 - 차트 뷰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }

        h1 {
            font-size: 2em;
            color: #fff;
        }

        .back-btn {
            padding: 10px 20px;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #2a2a2a;
            color: #fff;
            border-color: #555;
        }
        
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-buttons .back-btn {
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
        }

        /* 컨트롤 패널 */
        .control-panel {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
        }

        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .control-group label {
            color: #888;
            font-size: 14px;
        }

        .date-filter {
            display: flex;
            gap: 5px;
        }

        .date-filter button {
            padding: 8px 16px;
            background: #0a0a0a;
            color: #888;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .date-filter button.active {
            background: #333;
            color: #fff;
            border-color: #555;
        }

        .date-filter button:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .custom-date-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .custom-date-input input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .custom-date-input input:focus {
            outline: none;
            border-color: #4caf50;
        }

        .view-toggle {
            display: flex;
            gap: 5px;
        }

        .view-toggle button {
            padding: 8px 16px;
            background: #0a0a0a;
            color: #888;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .view-toggle button.active {
            background: #4caf50;
            color: #fff;
            border-color: #4caf50;
        }

        .view-toggle button:hover {
            background: #2a2a2a;
            color: #fff;
        }

        /* 차트 옵션 */
        .chart-options {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .chart-options select {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .chart-options select:focus {
            outline: none;
            border-color: #4caf50;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            user-select: none;
        }

        /* 통계 카드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
        }

        .stat-change {
            font-size: 0.9em;
            margin-top: 5px;
        }

        .positive { color: #4caf50; }
        .negative { color: #f44336; }

        /* 차트 컨테이너 */
        .chart-container {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            margin-bottom: 30px;
            position: relative;
            height: 500px;
            max-height: 500px;
            overflow: hidden;
        }
        
        #priceChart {
            max-height: 460px !important;
            height: 460px !important;
            display: block;
            width: 100% !important;
        }
        
        .chart-container canvas {
            position: relative !important;
        }

        .chart-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
        }

        .chart-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .chart-tab {
            padding: 8px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chart-tab.active {
            background: #333;
            color: #fff;
            border-color: #555;
        }

        /* 테이블 뷰 */
        .price-section {
            background: #0a0a0a;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.2em;
            color: #aaa;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 10px;
            text-align: left;
            color: #888;
            border-bottom: 2px solid #333;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #222;
        }

        tr:hover {
            background: #1a1a1a;
        }

        .price-change {
            font-size: 0.8em;
            margin-left: 5px;
        }

        .price-up { color: #4caf50; }
        .price-down { color: #f44336; }

        /* 심볼별 색상 */
        .btc-color { color: #f7931a; }
        .eth-color { color: #9a8ff8; }
        .sol-color { color: #00FFA3; }

        /* 로딩 상태 */
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }
            
            .control-group {
                flex-wrap: wrap;
            }
            
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* 다운로드 버튼 */
        .download-btn {
            padding: 8px 16px;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            background: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 암호화폐 가격 기록</h1>
            <div class="header-buttons">
                <button class="back-btn" onclick="window.location.href='high-low-range.html'" style="background: #ff5722; margin-right: 10px;">
                    📊 High-Low Range
                </button>
                <a href="index.html" class="back-btn">← 돌아가기</a>
            </div>
        </div>
        
        <!-- 차트 영역 -->
        <div class="chart-container" id="chart-container">
            <div class="chart-tabs">
                <div class="chart-tab active" onclick="selectChartTab('combined')">통합 차트</div>
                <div class="chart-tab" onclick="selectChartTab('btc')">BTC</div>
                <div class="chart-tab" onclick="selectChartTab('eth')">ETH</div>
                <div class="chart-tab" onclick="selectChartTab('sol')">SOL</div>
            </div>
            <canvas id="priceChart"></canvas>
            <div class="chart-loading" id="chart-loading">차트 로딩 중...</div>
        </div>
        
        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <!-- 기간 선택 -->
            <div class="control-group">
                <label>기간:</label>
                <div class="date-filter">
                    <button onclick="setDateRange(7)" id="btn-7">7일</button>
                    <button onclick="setDateRange(30)" class="active" id="btn-30">30일</button>
                    <button onclick="setDateRange(90)" id="btn-90">90일</button>
                    <button onclick="setDateRange(180)" id="btn-180">6개월</button>
                    <button onclick="setDateRange(365)" id="btn-365">1년</button>
                    <button onclick="setDateRange(0)" id="btn-all">전체</button>
                </div>
            </div>
            
            <!-- 사용자 지정 날짜 -->
            <div class="control-group custom-date-input">
                <input type="date" id="start-date" onchange="customDateRange()">
                <span>~</span>
                <input type="date" id="end-date" onchange="customDateRange()">
            </div>
            
            <!-- 뷰 전환 -->
            <div class="control-group">
                <label>보기:</label>
                <div class="view-toggle">
                    <button onclick="switchView('chart')" class="active" id="view-chart">차트</button>
                    <button onclick="switchView('table')" id="view-table">테이블</button>
                    <button onclick="switchView('both')" id="view-both">둘 다</button>
                </div>
            </div>
        </div>

        <!-- 차트 옵션 -->
        <div class="control-panel" id="chart-options-panel">
            <div class="control-group">
                <label>차트 타입:</label>
                <select id="chart-type" onchange="updateChartType()">
                    <option value="line">라인 차트</option>
                    <option value="candlestick">캔들스틱</option>
                    <option value="area">영역 차트</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>표시 데이터:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-btc" checked onchange="updateChartData()">
                    <label for="show-btc" class="btc-color">BTC</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-eth" checked onchange="updateChartData()">
                    <label for="show-eth" class="eth-color">ETH</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-sol" checked onchange="updateChartData()">
                    <label for="show-sol" class="sol-color">SOL</label>
                </div>
            </div>
            
            <div class="control-group">
                <label>이동평균선:</label>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-ma7" onchange="updateChartData()">
                    <label for="show-ma7">MA7</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="show-ma30" onchange="updateChartData()">
                    <label for="show-ma30">MA30</label>
                </div>
            </div>
            
            
            <button class="download-btn" onclick="downloadChart()">📥 차트 다운로드</button>
        </div>

        <!-- 통계 카드 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">BTC 현재가</div>
                <div class="stat-value btc-color" id="btc-current">-</div>
                <div class="stat-change" id="btc-change">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ETH 현재가</div>
                <div class="stat-value eth-color" id="eth-current">-</div>
                <div class="stat-change" id="eth-change">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">SOL 현재가</div>
                <div class="stat-value sol-color" id="sol-current">-</div>
                <div class="stat-change" id="sol-change">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">데이터 기간</div>
                <div class="stat-value" id="data-period">-</div>
                <div class="stat-change" id="data-count">-</div>
            </div>
        </div>

        <!-- 테이블 뷰 -->
        <div id="table-container" style="display: none;">
            <!-- BTC 가격 기록 -->
            <div class="price-section">
                <div class="section-header">
                    <h3 class="section-title">
                        <span class="btc-color">₿</span> BTC 가격 기록
                    </h3>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th style="text-align: right;">시가</th>
                                <th style="text-align: right;">고가</th>
                                <th style="text-align: right;">저가</th>
                                <th style="text-align: right;">종가</th>
                                <th style="text-align: right;">변동률</th>
                            </tr>
                        </thead>
                        <tbody id="btc-history-tbody">
                            <tr>
                                <td colspan="6" class="loading">데이터 로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- ETH 가격 기록 -->
            <div class="price-section">
                <div class="section-header">
                    <h3 class="section-title">
                        <span class="eth-color">Ξ</span> ETH 가격 기록
                    </h3>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th style="text-align: right;">시가</th>
                                <th style="text-align: right;">고가</th>
                                <th style="text-align: right;">저가</th>
                                <th style="text-align: right;">종가</th>
                                <th style="text-align: right;">변동률</th>
                            </tr>
                        </thead>
                        <tbody id="eth-history-tbody">
                            <tr>
                                <td colspan="6" class="loading">데이터 로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- SOL 가격 기록 -->
            <div class="price-section">
                <div class="section-header">
                    <h3 class="section-title">
                        <span class="sol-color">◎</span> SOL 가격 기록
                    </h3>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>날짜</th>
                                <th style="text-align: right;">시가</th>
                                <th style="text-align: right;">고가</th>
                                <th style="text-align: right;">저가</th>
                                <th style="text-align: right;">종가</th>
                                <th style="text-align: right;">변동률</th>
                            </tr>
                        </thead>
                        <tbody id="sol-history-tbody">
                            <tr>
                                <td colspan="6" class="loading">데이터 로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    
    <script>
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyA6zB_snzOh_e5tG6_-uK64g6dwL5pzU4c",
            authDomain: "crypto-monitor-84bdb.firebaseapp.com",
            databaseURL: "https://crypto-monitor-84bdb-default-rtdb.firebaseio.com",
            projectId: "crypto-monitor-84bdb",
            storageBucket: "crypto-monitor-84bdb.firebasestorage.app",
            messagingSenderId: "146592267275",
            appId: "1:146592267275:web:916c54658889be5dab9b0e",
            measurementId: "G-TTGCF3YWWJ"
        };
        
        // Firebase 초기화
        let database;
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();

        // 전역 변수
        let allData = {};
        let filteredData = [];
        let currentDays = 30;
        let currentView = 'chart';
        let currentChartTab = 'combined';
        let priceChart = null;
        // showHighLowRange 변수 제거됨 - 기능이 별도 페이지로 이동

        // 차트 색상
        const chartColors = {
            btc: '#f7931a',
            eth: '#9a8ff8',
            sol: '#00FFA3'
        };

        // 날짜 포맷 함수
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
        }

        // 가격 포맷 함수
        function formatPrice(price) {
            if (price === null || price === undefined) return '-';
            return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // 기간 설정
        function setDateRange(days) {
            currentDays = days;
            
            // 버튼 활성화 상태 변경
            document.querySelectorAll('.date-filter button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`btn-${days || 'all'}`).classList.add('active');
            
            // 날짜 입력 필드 업데이트
            const endDate = new Date();
            document.getElementById('end-date').value = endDate.toISOString().split('T')[0];
            
            if (days > 0) {
                const startDate = new Date();
                startDate.setDate(startDate.getDate() - days);
                document.getElementById('start-date').value = startDate.toISOString().split('T')[0];
            } else {
                document.getElementById('start-date').value = '';
            }
            
            loadData();
        }

        // 사용자 지정 날짜 범위
        function customDateRange() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            
            if (startDate && endDate) {
                // 버튼 비활성화
                document.querySelectorAll('.date-filter button').forEach(btn => {
                    btn.classList.remove('active');
                });
                
                currentDays = -1; // 사용자 지정
                loadData();
            }
        }

        // 뷰 전환
        function switchView(view) {
            currentView = view;
            
            // 버튼 활성화 상태
            document.querySelectorAll('.view-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`view-${view}`).classList.add('active');
            
            // 뷰 표시/숨김
            const chartContainer = document.getElementById('chart-container');
            const chartOptions = document.getElementById('chart-options-panel');
            const tableContainer = document.getElementById('table-container');
            
            if (view === 'chart') {
                chartContainer.style.display = 'block';
                chartOptions.style.display = 'flex';
                tableContainer.style.display = 'none';
            } else if (view === 'table') {
                chartContainer.style.display = 'none';
                chartOptions.style.display = 'none';
                tableContainer.style.display = 'block';
            } else { // both
                chartContainer.style.display = 'block';
                chartOptions.style.display = 'flex';
                tableContainer.style.display = 'block';
            }
            
            // 차트 업데이트
            if (view !== 'table') {
                updateChart();
            }
        }

        // 차트 탭 선택
        function selectChartTab(tab) {
            currentChartTab = tab;
            
            // 탭 활성화 상태
            document.querySelectorAll('.chart-tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateChart();
        }

        // 데이터 로드
        async function loadData() {
            document.getElementById('chart-loading').style.display = 'block';
            
            try {
                const snapshot = await database.ref('prices').once('value');
                allData = snapshot.val() || {};
                
                // 데이터를 배열로 변환
                const dataArray = Object.entries(allData).map(([date, data]) => ({
                    date,
                    ...data
                }));
                
                // 날짜순 정렬
                dataArray.sort((a, b) => a.date.localeCompare(b.date));
                
                // 기간 필터링
                if (currentDays > 0) {
                    const cutoffDate = new Date();
                    cutoffDate.setDate(cutoffDate.getDate() - currentDays);
                    filteredData = dataArray.filter(d => new Date(d.date) >= cutoffDate);
                } else if (currentDays === -1) { // 사용자 지정
                    const startDate = document.getElementById('start-date').value;
                    const endDate = document.getElementById('end-date').value;
                    filteredData = dataArray.filter(d => {
                        return d.date >= startDate && d.date <= endDate;
                    });
                } else { // 전체
                    filteredData = dataArray;
                }
                
                // 통계 업데이트
                updateStats();
                
                // 차트 업데이트
                if (currentView !== 'table') {
                    updateChart();
                }
                
                // 테이블 업데이트
                if (currentView !== 'chart') {
                    updateTables();
                }
                
            } catch (error) {
                console.error('데이터 로드 실패:', error);
            } finally {
                document.getElementById('chart-loading').style.display = 'none';
            }
        }

        // 통계 업데이트
        function updateStats() {
            if (filteredData.length === 0) return;
            
            const latest = filteredData[filteredData.length - 1];
            const previous = filteredData[filteredData.length - 2];
            
            // BTC
            if (latest.btc) {
                document.getElementById('btc-current').textContent = formatPrice(latest.btc);
                if (previous && previous.btc) {
                    const change = ((latest.btc - previous.btc) / previous.btc * 100).toFixed(2);
                    const changeEl = document.getElementById('btc-change');
                    changeEl.textContent = `${change > 0 ? '+' : ''}${change}%`;
                    changeEl.className = `stat-change ${change > 0 ? 'positive' : 'negative'}`;
                }
            }
            
            // ETH
            if (latest.eth) {
                document.getElementById('eth-current').textContent = formatPrice(latest.eth);
                if (previous && previous.eth) {
                    const change = ((latest.eth - previous.eth) / previous.eth * 100).toFixed(2);
                    const changeEl = document.getElementById('eth-change');
                    changeEl.textContent = `${change > 0 ? '+' : ''}${change}%`;
                    changeEl.className = `stat-change ${change > 0 ? 'positive' : 'negative'}`;
                }
            }
            
            // SOL
            if (latest.sol) {
                document.getElementById('sol-current').textContent = formatPrice(latest.sol);
                if (previous && previous.sol) {
                    const change = ((latest.sol - previous.sol) / previous.sol * 100).toFixed(2);
                    const changeEl = document.getElementById('sol-change');
                    changeEl.textContent = `${change > 0 ? '+' : ''}${change}%`;
                    changeEl.className = `stat-change ${change > 0 ? 'positive' : 'negative'}`;
                }
            }
            
            // 기간
            if (filteredData.length > 0) {
                const startDate = new Date(filteredData[0].date);
                const endDate = new Date(filteredData[filteredData.length - 1].date);
                document.getElementById('data-period').textContent = 
                    `${startDate.toLocaleDateString('ko-KR')} ~ ${endDate.toLocaleDateString('ko-KR')}`;
                document.getElementById('data-count').textContent = `${filteredData.length}일 데이터`;
            }
        }

        // 이동평균 계산
        function calculateMA(data, period) {
            const ma = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    ma.push(null);
                } else {
                    const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
                    ma.push(sum / period);
                }
            }
            return ma;
        }

        // 차트 업데이트
        function updateChart() {
            const ctx = document.getElementById('priceChart').getContext('2d');
            const chartType = document.getElementById('chart-type').value;
            
            // 상한가/하한가 범위 기능은 별도 페이지로 이동됨
            
            // 기존 차트 제거
            if (priceChart) {
                priceChart.destroy();
            }
            
            // 데이터셋 준비
            const datasets = [];
            const labels = filteredData.map(d => d.date);
            
            // BTC 데이터
            if (document.getElementById('show-btc').checked && 
                (currentChartTab === 'combined' || currentChartTab === 'btc')) {
                const btcPrices = filteredData.map(d => d.btc || null);
                
                // 상한가/하한가 범위 차트
                if (false) { // 상한가/하한가 범위 기능 제거됨
                    const btcHighPrices = filteredData.map(d => d.btc_high || d.btc || null);
                    const btcLowPrices = filteredData.map(d => d.btc_low || d.btc || null);
                    
                    // 범위 영역 채우기
                    datasets.push({
                        label: 'BTC 가격 범위',
                        data: btcHighPrices,
                        borderColor: chartColors.btc,
                        backgroundColor: chartColors.btc + '30',
                        fill: '+1',
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                    });
                    
                    datasets.push({
                        label: 'BTC 하한가',
                        data: btcLowPrices,
                        borderColor: chartColors.btc,
                        backgroundColor: 'transparent',
                        fill: false,
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                    });
                    
                    // 평균 가격 라인
                    datasets.push({
                        label: 'BTC 평균가',
                        data: btcPrices,
                        borderColor: chartColors.btc,
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: false,
                        yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                    });
                } else {
                    // 일반 차트
                    if (chartType === 'candlestick') {
                        // 캔들스틱 차트
                        datasets.push({
                            label: 'BTC',
                            data: filteredData.map(d => ({
                                x: d.date,
                                o: d.btc_open || d.btc,
                                h: d.btc_high || d.btc,
                                l: d.btc_low || d.btc,
                                c: d.btc || 0
                            })),
                            borderColor: chartColors.btc,
                            backgroundColor: chartColors.btc + '40',
                            type: 'candlestick'
                        });
                    } else {
                        // 라인/영역 차트
                        datasets.push({
                            label: 'BTC',
                            data: btcPrices,
                            borderColor: chartColors.btc,
                            backgroundColor: chartType === 'area' ? chartColors.btc + '20' : 'transparent',
                            tension: 0.1,
                            fill: chartType === 'area',
                            yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                        });
                    }
                }
                
                // 이동평균선 (상한가/하한가 범위가 아닐 때만)
                if (document.getElementById('show-ma7').checked) {
                    datasets.push({
                        label: 'BTC MA7',
                        data: calculateMA(btcPrices, 7),
                        borderColor: chartColors.btc + '80',
                        borderDash: [5, 5],
                        tension: 0.1,
                        fill: false,
                        yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                    });
                }
                if (document.getElementById('show-ma30').checked) {
                    datasets.push({
                        label: 'BTC MA30',
                        data: calculateMA(btcPrices, 30),
                        borderColor: chartColors.btc + '60',
                        borderDash: [10, 5],
                        tension: 0.1,
                        fill: false,
                        yAxisID: currentChartTab === 'combined' ? 'y-btc' : 'y'
                    });
                }
            }
            
            // ETH 데이터
            if (document.getElementById('show-eth').checked && 
                (currentChartTab === 'combined' || currentChartTab === 'eth')) {
                const ethPrices = filteredData.map(d => d.eth || null);
                
                // 상한가/하한가 범위 차트
                if (false) { // 상한가/하한가 범위 기능 제거됨
                    const ethHighPrices = filteredData.map(d => d.eth_high || d.eth || null);
                    const ethLowPrices = filteredData.map(d => d.eth_low || d.eth || null);
                    
                    datasets.push({
                        label: 'ETH 가격 범위',
                        data: ethHighPrices,
                        borderColor: chartColors.eth,
                        backgroundColor: chartColors.eth + '30',
                        fill: '+1',
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-eth' : 'y'
                    });
                    
                    datasets.push({
                        label: 'ETH 하한가',
                        data: ethLowPrices,
                        borderColor: chartColors.eth,
                        backgroundColor: 'transparent',
                        fill: false,
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-eth' : 'y'
                    });
                    
                    datasets.push({
                        label: 'ETH 평균가',
                        data: ethPrices,
                        borderColor: chartColors.eth,
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: false,
                        yAxisID: currentChartTab === 'combined' ? 'y-eth' : 'y'
                    });
                } else {
                    datasets.push({
                        label: 'ETH',
                        data: ethPrices,
                        borderColor: chartColors.eth,
                        backgroundColor: chartType === 'area' ? chartColors.eth + '20' : 'transparent',
                        tension: 0.1,
                        fill: chartType === 'area',
                        yAxisID: currentChartTab === 'combined' ? 'y-eth' : 'y'
                    });
                }
            }
            
            // SOL 데이터
            if (document.getElementById('show-sol').checked && 
                (currentChartTab === 'combined' || currentChartTab === 'sol')) {
                const solPrices = filteredData.map(d => d.sol || null);
                
                // 상한가/하한가 범위 차트
                if (false) { // 상한가/하한가 범위 기능 제거됨
                    const solHighPrices = filteredData.map(d => d.sol_high || d.sol || null);
                    const solLowPrices = filteredData.map(d => d.sol_low || d.sol || null);
                    
                    datasets.push({
                        label: 'SOL 가격 범위',
                        data: solHighPrices,
                        borderColor: chartColors.sol,
                        backgroundColor: chartColors.sol + '30',
                        fill: '+1',
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-sol' : 'y'
                    });
                    
                    datasets.push({
                        label: 'SOL 하한가',
                        data: solLowPrices,
                        borderColor: chartColors.sol,
                        backgroundColor: 'transparent',
                        fill: false,
                        tension: 0.1,
                        pointRadius: 0,
                        yAxisID: currentChartTab === 'combined' ? 'y-sol' : 'y'
                    });
                    
                    datasets.push({
                        label: 'SOL 평균가',
                        data: solPrices,
                        borderColor: chartColors.sol,
                        backgroundColor: 'transparent',
                        borderWidth: 2,
                        tension: 0.1,
                        fill: false,
                        yAxisID: currentChartTab === 'combined' ? 'y-sol' : 'y'
                    });
                } else {
                    datasets.push({
                        label: 'SOL',
                        data: solPrices,
                        borderColor: chartColors.sol,
                        backgroundColor: chartType === 'area' ? chartColors.sol + '20' : 'transparent',
                        tension: 0.1,
                        fill: chartType === 'area',
                        yAxisID: currentChartTab === 'combined' ? 'y-sol' : 'y'
                    });
                }
            }
            
            // 차트 옵션
            const options = {
                responsive: true,
                maintainAspectRatio: false,
                layout: {
                    padding: {
                        left: 10,
                        right: currentChartTab === 'combined' ? 120 : 10,
                        top: 10,
                        bottom: 10
                    }
                },
                plugins: {
                    legend: {
                        position: 'top',
                        labels: {
                            color: '#fff'
                        }
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(0, 0, 0, 0.8)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: '#333',
                        borderWidth: 1
                    },
                    zoom: {
                        pan: {
                            enabled: true,
                            mode: 'x'
                        },
                        zoom: {
                            wheel: {
                                enabled: true,
                            },
                            pinch: {
                                enabled: true
                            },
                            mode: 'x',
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: {
                            unit: 'day',
                            displayFormats: {
                                day: 'MM/dd'
                            }
                        },
                        grid: {
                            color: '#333'
                        },
                        ticks: {
                            color: '#888'
                        }
                    },
                    y: {
                        position: 'left',
                        grid: {
                            color: '#333'
                        },
                        ticks: {
                            color: currentChartTab === 'btc' ? chartColors.btc : 
                                   currentChartTab === 'eth' ? chartColors.eth : 
                                   currentChartTab === 'sol' ? chartColors.sol : '#888',
                            font: {
                                weight: currentChartTab !== 'combined' ? 'bold' : 'normal'
                            },
                            callback: function(value) {
                                return '$' + value.toLocaleString();
                            }
                        },
                        title: {
                            display: currentChartTab !== 'combined',
                            text: currentChartTab.toUpperCase(),
                            color: currentChartTab === 'btc' ? chartColors.btc : 
                                   currentChartTab === 'eth' ? chartColors.eth : 
                                   currentChartTab === 'sol' ? chartColors.sol : '#888',
                            font: {
                                size: 14,
                                weight: 'bold'
                            }
                        }
                    }
                }
            };
            
            // 통합 차트의 경우 다중 Y축
            if (currentChartTab === 'combined') {
                options.scales['y-btc'] = {
                    type: 'linear',
                    position: 'left',
                    grid: {
                        drawOnChartArea: false,
                        color: chartColors.btc + '30'
                    },
                    ticks: {
                        color: chartColors.btc,
                        font: {
                            size: 12,
                            weight: 'bold'
                        },
                        callback: function(value) {
                            return '$' + value.toLocaleString();
                        }
                    },
                    title: {
                        display: true,
                        text: 'BTC',
                        color: chartColors.btc,
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                };
                options.scales['y-eth'] = {
                    type: 'linear',
                    position: 'right',
                    grid: {
                        drawOnChartArea: false,
                        color: chartColors.eth + '30'
                    },
                    ticks: {
                        color: chartColors.eth,
                        font: {
                            size: 12,
                            weight: 'bold'
                        },
                        callback: function(value) {
                            return '$' + value.toLocaleString();
                        }
                    },
                    title: {
                        display: true,
                        text: 'ETH',
                        color: chartColors.eth,
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                };
                options.scales['y-sol'] = {
                    type: 'linear',
                    position: 'right',
                    offset: true,
                    grid: {
                        drawOnChartArea: false,
                        color: chartColors.sol + '30'
                    },
                    ticks: {
                        color: chartColors.sol,
                        font: {
                            size: 12,
                            weight: 'bold'
                        },
                        callback: function(value) {
                            return '$' + value.toLocaleString();
                        }
                    },
                    title: {
                        display: true,
                        text: 'SOL',
                        color: chartColors.sol,
                        font: {
                            size: 14,
                            weight: 'bold'
                        }
                    }
                };
            }
            
            // 차트 생성
            priceChart = new Chart(ctx, {
                type: chartType === 'candlestick' ? 'candlestick' : 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: options
            });
        }

        // 차트 타입 변경
        function updateChartType() {
            updateChart();
        }

        // 차트 데이터 업데이트
        function updateChartData() {
            updateChart();
        }

        // 상한가/하한가 범위 토글 함수 제거됨 - 별도 페이지로 이동
        
        // 차트 다운로드
        function downloadChart() {
            const canvas = document.getElementById('priceChart');
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.download = `crypto-chart-${new Date().toISOString().split('T')[0]}.png`;
            a.href = url;
            a.click();
        }

        // 테이블 업데이트
        function updateTables() {
            // 각 코인별로 테이블 업데이트
            ['btc', 'eth', 'sol'].forEach(coin => {
                updateCoinTable(coin);
            });
        }

        // 코인별 테이블 업데이트
        function updateCoinTable(coin) {
            const tbody = document.getElementById(`${coin}-history-tbody`);
            
            // 해당 코인 데이터만 필터링
            const coinData = filteredData.filter(d => d[coin] !== undefined && d[coin] !== null);
            
            if (coinData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="loading">데이터가 없습니다</td></tr>';
                return;
            }
            
            // 최신 데이터부터 표시
            const reversedData = [...coinData].reverse();
            
            tbody.innerHTML = reversedData.map((record, index) => {
                const prevRecord = reversedData[index + 1];
                let changeHtml = '';
                
                if (prevRecord && prevRecord[coin]) {
                    const change = ((record[coin] - prevRecord[coin]) / prevRecord[coin] * 100);
                    const changeClass = change >= 0 ? 'price-up' : 'price-down';
                    const changeSymbol = change >= 0 ? '+' : '';
                    changeHtml = `<span class="price-change ${changeClass}">${changeSymbol}${change.toFixed(2)}%</span>`;
                }
                
                return `
                    <tr>
                        <td>${formatDate(record.date)}</td>
                        <td style="text-align: right;">${formatPrice(record[`${coin}_open`] || record[coin])}</td>
                        <td style="text-align: right;">${formatPrice(record[`${coin}_high`] || record[coin])}</td>
                        <td style="text-align: right;">${formatPrice(record[`${coin}_low`] || record[coin])}</td>
                        <td style="text-align: right;">${formatPrice(record[coin])}</td>
                        <td style="text-align: right;">${changeHtml}</td>
                    </tr>
                `;
            }).join('');
        }

        // 초기화
        window.onload = () => {
            // 날짜 입력 최대값 설정
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('start-date').max = today;
            document.getElementById('end-date').max = today;
            
            // 초기 데이터 로드
            setDateRange(30);
        };
    </script>
</body>
</html>
