<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 가격 수집기 - 암호화폐 가격 모니터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #333;
        }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .status-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        
        .status-card h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .status-value {
            font-size: 24px;
            font-weight: bold;
            color: #4caf50;
        }
        
        .status-subtitle {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .collection-status {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        
        .calendar-view {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-top: 20px;
        }
        
        .calendar-header {
            text-align: center;
            color: #666;
            font-size: 12px;
            padding: 5px;
        }
        
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .calendar-day.has-data {
            background: #1a3a1a;
            border: 1px solid #4caf50;
            color: #4caf50;
        }
        
        .calendar-day.no-data {
            background: #3a1a1a;
            border: 1px solid #f44336;
            color: #f44336;
        }
        
        .calendar-day.future {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #444;
            cursor: not-allowed;
        }
        
        .calendar-day.selected {
            background: #2196f3;
            border-color: #2196f3;
            color: #fff;
        }
        
        .calendar-day:hover:not(.future) {
            transform: scale(1.1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }
        
        .date-range-selector {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .form-group input {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #4caf50;
        }
        
        button {
            padding: 12px 24px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            align-self: flex-end;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-1px);
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            font-size: 14px;
        }
        
        .quick-btn:hover {
            background: #3a3a3a;
            border-color: #666;
        }
        
        .progress {
            background: #333;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            background: #4caf50;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #000;
            font-weight: bold;
        }
        
        .log {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #333;
        }
        
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
        
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .month-nav button {
            padding: 8px 16px;
            background: #2a2a2a;
            border: 1px solid #444;
            font-size: 14px;
        }
        
        .current-month {
            font-size: 18px;
            font-weight: bold;
        }
        
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            font-size: 12px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        
        .back-btn {
            padding: 10px 20px;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: #2a2a2a;
            color: #fff;
            border-color: #555;
        }
        
        @media (max-width: 768px) {
            .date-range-selector {
                grid-template-columns: 1fr;
            }
            
            .status-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 고급 가격 수집기</h1>
            <a href="links.html" class="back-btn">← 링크 모음</a>
        </div>
        
        <!-- 현재 상태 -->
        <div class="status-grid">
            <div class="status-card">
                <h3>전체 데이터</h3>
                <div class="status-value" id="total-days">0</div>
                <div class="status-subtitle">수집된 일수</div>
            </div>
            <div class="status-card">
                <h3>데이터 범위</h3>
                <div class="status-value" id="date-range">-</div>
                <div class="status-subtitle" id="date-range-detail">시작일 ~ 종료일</div>
            </div>
            <div class="status-card">
                <h3>완성도</h3>
                <div class="status-value" id="completeness">0%</div>
                <div class="status-subtitle">최근 90일 기준</div>
            </div>
            <div class="status-card">
                <h3>마지막 업데이트</h3>
                <div class="status-value" id="last-update">-</div>
                <div class="status-subtitle">최신 데이터</div>
            </div>
        </div>
        
        <!-- 캘린더 뷰 -->
        <div class="collection-status">
            <h2>📅 수집 현황 (캘린더 뷰)</h2>
            <div class="month-nav">
                <button onclick="changeMonth(-1)">◀ 이전달</button>
                <span class="current-month" id="current-month">2024년 11월</span>
                <button onclick="changeMonth(1)">다음달 ▶</button>
            </div>
            <div class="calendar-view" id="calendar">
                <!-- 동적으로 생성됨 -->
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box" style="background: #1a3a1a; border: 1px solid #4caf50;"></div>
                    <span>데이터 있음</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: #3a1a1a; border: 1px solid #f44336;"></div>
                    <span>데이터 없음</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background: #0a0a0a; border: 1px solid #333;"></div>
                    <span>미래 날짜</span>
                </div>
            </div>
        </div>
        
        <!-- 수집 컨트롤 -->
        <div class="controls">
            <h2>🎯 데이터 수집</h2>
            
            <div class="quick-actions">
                <button class="quick-btn" onclick="setDateRange(1)">어제</button>
                <button class="quick-btn" onclick="setDateRange(7)">최근 7일</button>
                <button class="quick-btn" onclick="setDateRange(30)">최근 30일</button>
                <button class="quick-btn" onclick="setDateRange(90)">최근 90일</button>
                <button class="quick-btn" onclick="setDateRange(365)">최근 1년</button>
                <button class="quick-btn" onclick="collectMissingOnly()">누락된 날짜만</button>
            </div>
            
            <div class="date-range-selector">
                <div class="form-group">
                    <label for="start-date">시작일</label>
                    <input type="date" id="start-date" max="">
                </div>
                <div class="form-group">
                    <label for="end-date">종료일</label>
                    <input type="date" id="end-date" max="">
                </div>
                <button onclick="collectDateRange()" id="collect-btn">수집 시작</button>
            </div>
            
            <div class="progress" style="display: none;" id="progress-bar">
                <div class="progress-fill" id="progress-fill">0%</div>
            </div>
            
            <div class="log" id="log"></div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    
    <script>
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyA6zB_snzOh_e5tG6_-uK64g6dwL5pzU4c",
            authDomain: "crypto-monitor-84bdb.firebaseapp.com",
            databaseURL: "https://crypto-monitor-84bdb-default-rtdb.firebaseio.com",
            projectId: "crypto-monitor-84bdb",
            storageBucket: "crypto-monitor-84bdb.firebasestorage.app",
            messagingSenderId: "146592267275",
            appId: "1:146592267275:web:916c54658889be5dab9b0e",
            measurementId: "G-TTGCF3YWWJ"
        };
        
        // Firebase 초기화
        let database;
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        database = firebase.database();
        
        // 전역 변수
        let existingData = {};
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let isCollecting = false;
        
        // DOM 요소
        const logDiv = document.getElementById('log');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const collectBtn = document.getElementById('collect-btn');
        
        // 로그 함수
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('ko-KR');
            logDiv.innerHTML = `<div class="${type}">[${time}] ${message}</div>` + logDiv.innerHTML;
            
            // 로그 제한
            const logs = logDiv.children;
            if (logs.length > 50) {
                logDiv.removeChild(logs[logs.length - 1]);
            }
        }
        
        // 날짜 문자열 생성
        function getDateString(date) {
            return date.toISOString().split('T')[0];
        }
        
        // 오늘 날짜 설정
        function setTodayAsMax() {
            const today = getDateString(new Date());
            document.getElementById('start-date').max = today;
            document.getElementById('end-date').max = today;
            document.getElementById('end-date').value = today;
            
            // 30일 전을 기본 시작일로
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            document.getElementById('start-date').value = getDateString(thirtyDaysAgo);
        }
        
        // 날짜 범위 설정
        function setDateRange(days) {
            const end = new Date();
            const start = new Date();
            start.setDate(start.getDate() - days);
            
            document.getElementById('start-date').value = getDateString(start);
            document.getElementById('end-date').value = getDateString(end);
        }
        
        // 데이터 상태 로드
        async function loadDataStatus() {
            try {
                const snapshot = await database.ref('prices').once('value');
                existingData = snapshot.val() || {};
                
                const dates = Object.keys(existingData).sort();
                const totalDays = dates.length;
                
                // 상태 업데이트
                document.getElementById('total-days').textContent = totalDays;
                
                if (totalDays > 0) {
                    const firstDate = new Date(dates[0]);
                    const lastDate = new Date(dates[dates.length - 1]);
                    
                    document.getElementById('date-range').textContent = `${dates.length}일`;
                    document.getElementById('date-range-detail').textContent = 
                        `${dates[0]} ~ ${dates[dates.length - 1]}`;
                    
                    document.getElementById('last-update').textContent = 
                        new Date(dates[dates.length - 1]).toLocaleDateString('ko-KR');
                    
                    // 완성도 계산 (최근 90일 기준)
                    const ninetyDaysAgo = new Date();
                    ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
                    let missingCount = 0;
                    
                    for (let d = new Date(ninetyDaysAgo); d <= new Date(); d.setDate(d.getDate() + 1)) {
                        const dateStr = getDateString(d);
                        if (!existingData[dateStr]) {
                            missingCount++;
                        }
                    }
                    
                    const completeness = Math.round(((90 - missingCount) / 90) * 100);
                    document.getElementById('completeness').textContent = `${completeness}%`;
                }
                
                // 캘린더 업데이트
                updateCalendar();
                
                log(`데이터 상태 로드 완료: ${totalDays}개 날짜`, 'success');
                
            } catch (error) {
                log('데이터 상태 로드 실패: ' + error.message, 'error');
            }
        }
        
        // 캘린더 업데이트
        function updateCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            // 요일 헤더
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            weekdays.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-header';
                header.textContent = day;
                calendar.appendChild(header);
            });
            
            // 현재 월의 정보
            const year = currentYear;
            const month = currentMonth;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            // 빈 칸 채우기
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                calendar.appendChild(empty);
            }
            
            // 날짜 채우기
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = getDateString(date);
                const dayDiv = document.createElement('div');
                dayDiv.className = 'calendar-day';
                dayDiv.textContent = day;
                dayDiv.dataset.date = dateStr;
                
                if (date > today) {
                    dayDiv.classList.add('future');
                } else if (existingData[dateStr]) {
                    dayDiv.classList.add('has-data');
                    dayDiv.title = '데이터 있음';
                } else {
                    dayDiv.classList.add('no-data');
                    dayDiv.title = '데이터 없음 - 클릭하여 수집';
                    dayDiv.onclick = () => collectSingleDate(dateStr);
                }
                
                calendar.appendChild(dayDiv);
            }
            
            // 월 표시 업데이트
            document.getElementById('current-month').textContent = 
                `${year}년 ${month + 1}월`;
        }
        
        // 월 변경
        function changeMonth(direction) {
            currentMonth += direction;
            
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            
            updateCalendar();
        }
        
        // 단일 날짜 수집
        async function collectSingleDate(dateStr) {
            if (isCollecting) {
                log('이미 수집 중입니다', 'warning');
                return;
            }
            
            const date = new Date(dateStr + 'T00:00:00Z');
            log(`${dateStr} 데이터 수집 시작...`, 'info');
            
            isCollecting = true;
            const success = await collectDataForDate(date);
            isCollecting = false;
            
            if (success) {
                await loadDataStatus();
            }
        }
        
        // 날짜 범위 수집
        async function collectDateRange() {
            if (isCollecting) {
                log('이미 수집 중입니다', 'warning');
                return;
            }
            
            const startDate = new Date(document.getElementById('start-date').value + 'T00:00:00Z');
            const endDate = new Date(document.getElementById('end-date').value + 'T00:00:00Z');
            
            if (startDate > endDate) {
                log('시작일이 종료일보다 늦습니다', 'error');
                return;
            }
            
            isCollecting = true;
            collectBtn.disabled = true;
            progressBar.style.display = 'block';
            
            const dates = [];
            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                dates.push(new Date(d));
            }
            
            log(`${dates.length}개 날짜 수집 시작...`, 'info');
            
            let collected = 0;
            for (let i = 0; i < dates.length; i++) {
                const date = dates[i];
                const dateStr = getDateString(date);
                
                // 이미 데이터가 있으면 건너뛰기
                if (existingData[dateStr]) {
                    log(`${dateStr}: 이미 데이터 있음 - 건너뛰기`, 'info');
                    collected++;
                } else {
                    const success = await collectDataForDate(date);
                    if (success) collected++;
                }
                
                // 진행률 업데이트
                const progress = Math.round(((i + 1) / dates.length) * 100);
                progressFill.style.width = `${progress}%`;
                progressFill.textContent = `${progress}%`;
                
                // API 제한 방지
                if (i < dates.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 200));
                }
            }
            
            log(`✅ 수집 완료: ${collected}/${dates.length}개 성공`, 'success');
            
            isCollecting = false;
            collectBtn.disabled = false;
            progressBar.style.display = 'none';
            
            // 상태 업데이트
            await loadDataStatus();
        }
        
        // 누락된 날짜만 수집
        async function collectMissingOnly() {
            const ninetyDaysAgo = new Date();
            ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
            
            document.getElementById('start-date').value = getDateString(ninetyDaysAgo);
            document.getElementById('end-date').value = getDateString(new Date());
            
            // 수집 시작
            await collectDateRange();
        }
        
        // 특정 날짜 데이터 수집
        async function collectDataForDate(date) {
            const dateStr = getDateString(date);
            const startTime = date.getTime();
            const endTime = startTime + (24 * 60 * 60 * 1000) - 1;
            
            try {
                const dayData = {
                    date: dateStr,
                    collected_at: new Date().toISOString()
                };
                
                const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT'];
                
                for (const symbol of symbols) {
                    const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1d&startTime=${startTime}&endTime=${endTime}&limit=1`;
                    
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            const klines = await response.json();
                            if (klines.length > 0) {
                                const kline = klines[0];
                                const prefix = symbol.replace('USDT', '').toLowerCase();
                                
                                dayData[prefix] = parseFloat(kline[4]); // 종가
                                dayData[`${prefix}_high`] = parseFloat(kline[2]); // 고가
                                dayData[`${prefix}_low`] = parseFloat(kline[3]); // 저가
                                dayData[`${prefix}_open`] = parseFloat(kline[1]); // 시가
                                dayData[`${prefix}_volume`] = parseFloat(kline[5]); // 거래량
                            }
                        }
                    } catch (error) {
                        log(`${symbol} 데이터 수집 실패: ${error.message}`, 'error');
                    }
                    
                    // API 제한 방지
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                // Firebase에 저장
                if (dayData.btc || dayData.eth || dayData.sol) {
                    await database.ref(`prices/${dateStr}`).set(dayData);
                    existingData[dateStr] = dayData;
                    log(`✅ ${dateStr} 데이터 저장 완료`, 'success');
                    return true;
                }
                
                return false;
                
            } catch (error) {
                log(`❌ ${dateStr} 수집 실패: ${error.message}`, 'error');
                return false;
            }
        }
        
        // 초기화
        window.onload = async () => {
            log('고급 가격 수집기 초기화 중...', 'info');
            
            setTodayAsMax();
            await loadDataStatus();
            
            log('준비 완료!', 'success');
        };
    </script>
</body>
</html>
