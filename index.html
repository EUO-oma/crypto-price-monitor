<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Price</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #0a0a0a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            max-width: 900px;
            width: 100%;
            border: 1px solid #1a1a1a;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
        }

        .exchange-section {
            margin-bottom: 40px;
        }

        h2 {
            color: #aaa;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #333;
        }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .price-card {
            background: #1a1a1a;
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s ease;
            border: 1px solid #333;
        }

        .price-card:hover {
            transform: translateY(-5px);
        }

        .symbol {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .price {
            font-size: 2.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .timestamp {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .status {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #333;
            color: #888;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }

        .links a {
            color: #888;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #aaa;
            text-decoration: underline;
        }

        #status-message {
            display: inline-block;
            margin-right: 20px;
            font-weight: bold;
        }

        .connected {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333;">
            <div style="color: #aaa; font-size: 0.9em; margin-bottom: 10px;">
                <span style="color: #888;">URL:</span> 
                <span style="color: #bbb; font-family: monospace;">euo.netlify.app</span>
            </div>
            <div>
                <a href="https://www.weather.go.kr/w/weather/warning/status.do" target="_blank" style="color: #888; text-decoration: none; font-size: 0.85em;">
                    🌦️ 날씨누리 특보현황
                </a>
            </div>
        </div>
        <div class="exchange-section">
            <h2>Binance</h2>
            <div class="price-grid">
                <div class="price-card">
                    <div class="symbol">BTCUSDT</div>
                    <div class="price" id="binance-btc">로딩중...</div>
                </div>
                <div class="price-card">
                    <div class="symbol">ETHUSDT</div>
                    <div class="price" id="binance-eth">로딩중...</div>
                </div>
                <div class="price-card">
                    <div class="symbol">XRPUSDT</div>
                    <div class="price" id="binance-xrp">로딩중...</div>
                </div>
                <div class="price-card">
                    <div class="symbol">SOLUSDT</div>
                    <div class="price" id="binance-sol">로딩중...</div>
                </div>
            </div>
        </div>

        <div class="status">
            <span id="status-message">接続中...</span>
            <span id="last-update">最終更新: -</span>
        </div>
        
        <div class="links">
            <a href="https://chatgpt.com/g/g-6806fd8c48b481919be4a862d7397855-gongsonhan-pyohyeon-doumi" target="_blank">GPT 공손화</a>
            <span style="color: #444;">│</span>
            <a href="https://chatgpt.com/g/g-68b5288a57188191a2f6fd5b4dda9e89-haegsimman-balcwe" target="_blank">핵심만 발췌</a>
            <span style="color: #444;">│</span>
            <a href="https://chatgpt.com/g/g-6892fc320bd48191b2b451d16a6b29c8-baendeuhongbogeul-mabeobsa" target="_blank">밴드홍보글 마법사</a>
        </div>
        
        <div class="links" style="margin-top: 15px;">
            <span style="color: #aaa; font-size: 0.85em;">📺 암호화폐 라이브</span><br>
            <a href="https://www.youtube.com/@zzap9/live" target="_blank">짭구</a>
            <span style="color: #444;">│</span>
            <a href="https://www.youtube.com/@live-streamersatto/live" target="_blank">사또</a>
            <span style="color: #444;">│</span>
            <a href="https://www.youtube.com/@852hodoo/live" target="_blank">박호두</a>
            <span style="color: #444;">│</span>
            <a href="https://www.youtube.com/@jadoodoo/live" target="_blank">자두두</a>
        </div>
    </div>

    <script>
        let binanceBtcWs = null;
        let binanceEthWs = null;
        let binanceXrpWs = null;
        let binanceSolWs = null;

        function formatPrice(price) {
            const num = parseFloat(price);
            const parts = num.toFixed(2).split('.');
            const integerPart = parseInt(parts[0]).toLocaleString('en-US');
            return `<span>${integerPart}</span><span style="color: #666; font-size: 0.8em;">.${parts[1]}</span>`;
        }


        function updateLastUpdate() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            const dateString = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}`;
            const timeString = `${dateString} ${displayHours}:${minutes}:${seconds} ${ampm}`;
            document.getElementById('last-update').textContent = `最終更新: ${timeString}`;
        }

        // Binance WebSocket
        function connectBinance() {
            const symbols = ['btcusdt', 'ethusdt', 'xrpusdt', 'solusdt'];
            
            symbols.forEach(symbol => {
                const ws = new WebSocket(`wss://fstream.binance.com/ws/${symbol}@ticker`);
                
                ws.onopen = function() {
                    document.getElementById('status-message').textContent = '接続済み';
                    document.getElementById('status-message').className = 'connected';
                };

                ws.onmessage = function(event) {
                    const data = JSON.parse(event.data);
                    if (data.c) {
                        const price = data.c;
                        if (symbol === 'btcusdt') {
                            document.getElementById('binance-btc').innerHTML = formatPrice(price);
                            document.getElementById('binance-btc').classList.remove('loading');
                        } else if (symbol === 'ethusdt') {
                            document.getElementById('binance-eth').innerHTML = formatPrice(price);
                            document.getElementById('binance-eth').classList.remove('loading');
                        } else if (symbol === 'xrpusdt') {
                            document.getElementById('binance-xrp').innerHTML = formatPrice(price);
                            document.getElementById('binance-xrp').classList.remove('loading');
                        } else if (symbol === 'solusdt') {
                            document.getElementById('binance-sol').innerHTML = formatPrice(price);
                            document.getElementById('binance-sol').classList.remove('loading');
                        }
                        updateLastUpdate();
                    }
                };

                ws.onerror = function(error) {
                    console.error('Binance WebSocket error:', error);
                    document.getElementById('status-message').textContent = '接続エラー';
                    document.getElementById('status-message').className = 'error';
                };

                if (symbol === 'btcusdt') {
                    binanceBtcWs = ws;
                } else if (symbol === 'ethusdt') {
                    binanceEthWs = ws;
                } else if (symbol === 'xrpusdt') {
                    binanceXrpWs = ws;
                } else if (symbol === 'solusdt') {
                    binanceSolWs = ws;
                }
            });
        }

        // 초기 로딩 클래스 추가
        document.querySelectorAll('.price').forEach(el => {
            el.classList.add('loading');
        });

        // WebSocket 연결 시작
        connectBinance();

        // 연결 상태 체크 (30초마다)
        setInterval(() => {
            if (binanceBtcWs && binanceBtcWs.readyState !== WebSocket.OPEN) {
                connectBinance();
            }
        }, 30000);
    </script>
</body>
</html>
